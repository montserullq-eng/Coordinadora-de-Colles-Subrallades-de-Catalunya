<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rànquing Castellers Subrallats</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #d32f2f; border-bottom: 2px solid #f0f0f0; padding-bottom: 10px; margin-top: 0; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: #f4f7f6; padding: 10px 0; z-index: 100; }
        .nav button { flex: 1; padding: 12px; border: none; border-radius: 10px; background: #e0e0e0; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .nav button.active { background: #d32f2f; color: white; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn-enviar { background: #2e7d32; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #fdfdfd; color: #666; text-transform: uppercase; font-size: 12px; }
        .total-box { font-size: 24px; font-weight: bold; color: #d32f2f; margin: 20px 0; text-align: center; background: #fff5f5; padding: 15px; border-radius: 10px; border: 1px dashed #d32f2f; }
        #admin-panel { display: none; }
        .ranking-row { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .colla-name { font-weight: bold; font-size: 18px; }
        .colla-score { color: #d32f2f; font-weight: 800; font-size: 20px; }
    </style>
</head>
<body>

    <div class="nav">
        <button id="btn-rank" class="active" onclick="showTab('ranking')">🏆 Rànquing</button>
        <button id="btn-hist" onclick="showTab('historic')">📅 Diades</button>
        <button onclick="checkAdmin()">⚙️ Admin</button>
    </div>

    <div id="tab-ranking" class="tab-content">
        <div class="card">
            <h2>Rànquing General (Top 5)</h2>
            <div id="ranking-list">Carregant dades del Google Sheets...</div>
        </div>
    </div>

    <div id="tab-historic" class="tab-content" style="display:none;">
        <div class="card">
            <h2>Històric de totes les Diades</h2>
            <div id="historic-list">Carregant diades...</div>
        </div>
    </div>

    <div id="admin-panel" class="tab-content">
        <div class="card">
            <h2>Nova Diada (Accés Admin)</h2>
            <form id="castellsForm">
                <input type="text" id="diada" placeholder="Nom de la Diada (Ex: Diada de Tardor)" required>
                <input type="date" id="data" required>
                <select id="colla" required>
                    <option value="">-- Selecciona la Colla --</option>
                    <option>Estressats de Terrassa</option>
                    <option>Col·locats del Vendrell</option>
                    <option>Subrallats de Vic</option>
                </select>

                <div style="display:flex; gap:5px;">
                    <select id="r1" onchange="calcTotal()"><option value="">1a Ronda</option></select>
                    <select id="e1" onchange="calcTotal()" style="width: 80px;"><option value="d">D</option><option value="c">C</option></select>
                </div>
                <div style="display:flex; gap:5px;">
                    <select id="r2" onchange="calcTotal()"><option value="">2a Ronda</option></select>
                    <select id="e2" onchange="calcTotal()" style="width: 80px;"><option value="d">D</option><option value="c">C</option></select>
                </div>
                <div style="display:flex; gap:5px;">
                    <select id="r3" onchange="calcTotal()"><option value="">3a Ronda</option></select>
                    <select id="e3" onchange="calcTotal()" style="width: 80px;"><option value="d">D</option><option value="c">C</option></select>
                </div>

                <input type="number" id="pilar" placeholder="Punts Pilar de Mèrit" value="0" oninput="calcTotal()">
                <input type="number" id="extra" placeholder="Punts Extra / Altres" value="0" oninput="calcTotal()">
                
                <div class="total-box">PUNTUACIÓ DIADA: <span id="totalTxt">0</span></div>
                
                <textarea id="comentaris" placeholder="Anotacions (Ex: Primera vegada que intentem...)"></textarea>
                <button type="submit" class="btn-enviar">Publicar Diada</button>
            </form>
        </div>
    </div>

    <script>
        // URL de la teva Apps Script ja inserida
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxDCsraLzl9TEPgzxFZDT0DRP-oocdQtfL46tMNjtxXM9vxl3CURIrhJNb4W51TgxJ1hw/exec"; 
        const PIN_ADMIN = "1234";

        const punts = {"pd4n":{"d":35,"c":18},"pd4":{"d":45,"c":23},"pd5n":{"d":55,"c":28},"pd5":{"d":65,"c":33},"pd6n":{"d":75,"c":38},"pd6":{"d":85,"c":43},"2d6n":{"d":135,"c":68},"2d6":{"d":140,"c":70},"2d7n":{"d":170,"c":85},"2d7":{"d":180,"c":90},"3d6n":{"d":245,"c":123},"4d6n":{"d":250,"c":125},"3d6":{"d":255,"c":128},"4d6":{"d":260,"c":130},"2d6an":{"d":265,"c":133},"pd7n":{"d":270,"c":135},"2d6a":{"d":275,"c":138},"pd7":{"d":280,"c":140},"4d6an":{"d":285,"c":143},"3d6an":{"d":290,"c":145},"4d6a":{"d":295,"c":148},"3d6a":{"d":300,"c":150},"pd8n":{"d":360,"c":180},"pd8":{"d":370,"c":185},"3d7n":{"d":395,"c":198},"3d7":{"d":405,"c":203},"2d8n":{"d":410,"c":205},"4d7n":{"d":415,"c":208},"2d8sf":{"d":420,"c":210},"4d7":{"d":425,"c":213},"pd7f":{"d":450,"c":225},"2d8f":{"d":500,"c":250},"pd9n":{"d":500,"c":250},"3d7an":{"d":515,"c":258},"3d7a":{"d":525,"c":263},"4d7an":{"d":545,"c":273},"pd9sf":{"d":550,"c":275},"4d7a":{"d":555,"c":278},"5d6n":{"d":595,"c":298},"pd8f":{"d":600,"c":300},"5d6":{"d":605,"c":303},"7d6n":{"d":715,"c":358},"7d6":{"d":725,"c":363},"5d6an":{"d":755,"c":378},"5d6a":{"d":775,"c":388},"pd8fm":{"d":780,"c":390},"pd9f":{"d":800,"c":400},"3d8n":{"d":845,"c":423},"3d8":{"d":865,"c":433},"7d6an":{"d":885,"c":443},"7d6a":{"d":895,"c":448},"pd9fm":{"d":900,"c":450},"2d9n":{"d":900,"c":450},"3d8an":{"d":950,"c":475},"2d9sf":{"d":950,"c":475},"3d8a":{"d":960,"c":480},"5d7n":{"d":965,"c":483},"4d8n":{"d":970,"c":485},"5d7":{"d":975,"c":488},"4d8":{"d":990,"c":495},"2d9f":{"d":1000,"c":500},"pd9fmp":{"d":1000,"c":500},"3d9n":{"d":1050,"c":525},"4d8an":{"d":1050,"c":525},"4d8a":{"d":1060,"c":530},"5d7an":{"d":1070,"c":535},"5d7a":{"d":1080,"c":540},"7d7n":{"d":1095,"c":548},"3d9sf":{"d":1100,"c":550},"2d9fm":{"d":1100,"c":550},"7d7":{"d":1105,"c":553},"7d7an":{"d":1190,"c":595},"3d9f":{"d":1200,"c":600},"7d7a":{"d":1210,"c":605},"4d9n":{"d":1450,"c":725},"4d9sf":{"d":1500,"c":750},"pd10n":{"d":1500,"c":750},"9d6n":{"d":1540,"c":770},"pd10sf":{"d":1550,"c":775},"9d6":{"d":1560,"c":780},"2d10n":{"d":1600,"c":800},"pd10f":{"d":1650,"c":825},"5d8n":{"d":1670,"c":835},"2d10sf":{"d":1700,"c":850},"3d9an":{"d":1700,"c":850},"3d9a":{"d":1750,"c":875},"pd10fm":{"d":1750,"c":875},"9d7n":{"d":1750,"c":875},"5d8":{"d":1790,"c":895},"7d8n":{"d":1795,"c":898},"4d9f":{"d":1800,"c":900},"2d10f":{"d":1800,"c":900},"4d9an":{"d":1800,"c":900},"9d7":{"d":1800,"c":900},"7d8":{"d":1815,"c":908},"3d9fa":{"d":1850,"c":925},"4d9a":{"d":1850,"c":925},"5d8an":{"d":1915,"c":958},"5d8a":{"d":1935,"c":968},"4d9fa":{"d":1950,"c":975},"pd10fmp":{"d":1980,"c":990},"2d10fm":{"d":2000,"c":1000},"2d10fmp":{"d":2200,"c":1100},"5d9n":{"d":2700,"c":1350},"5d9sf":{"d":2750,"c":1375},"5d9f":{"d":2850,"c":1425},"3d10n":{"d":2900,"c":1450},"3d10sf":{"d":2950,"c":1475},"3d10f":{"d":3050,"c":1525},"3d10fmp":{"d":3150,"c":1575},"pd10fmpa":{"d":3300,"c":1650}};

        ["r1", "r2", "r3"].forEach(id => {
            const select = document.getElementById(id);
            Object.keys(punts).forEach(c => {
                let opt = document.createElement("option");
                opt.value = c; opt.innerText = c; select.appendChild(opt);
            });
        });

        function calcTotal() {
            let total = 0;
            [1,2,3].forEach(i => {
                let c = document.getElementById("r"+i).value;
                let m = document.getElementById("e"+i).value;
                if(punts[c]) total += punts[c][m];
            });
            total += parseInt(document.getElementById("pilar").value) || 0;
            total += parseInt(document.getElementById("extra").value) || 0;
            document.getElementById("totalTxt").innerText = total;
            return total;
        }

        function showTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = 'block';
            if(tab === 'ranking' || tab === 'historic') loadData();
        }

        function checkAdmin() {
            const pin = prompt("PIN d'Administrador:");
            if (pin === PIN_ADMIN) {
                document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                document.getElementById('admin-panel').style.display = 'block';
            } else if (pin !== null) { alert("PIN Incorrecte"); }
        }

        async function loadData() {
            try {
                const res = await fetch(WEB_APP_URL);
                const data = await res.json();
                renderRanking(data);
                renderHistoric(data);
            } catch (e) { console.error("Error carregant dades", e); }
        }

        function renderRanking(rows) {
            const colles = {};
            // El rànquing ignora la primera fila (capçaleres)
            rows.slice(1).forEach(r => {
                const nomColla = r[0];
                const puntsDiada = parseFloat(r[11]) || 0;
                if(!colles[nomColla]) colles[nomColla] = [];
                colles[nomColla].push(puntsDiada);
            });

            let html = "";
            const llistaOrdenada = Object.keys(colles).map(c => {
                const top5 = colles[c].sort((a,b) => b-a).slice(0,5);
                const suma = top5.reduce((a,b) => a+b, 0);
                return { nom: c, total: suma };
            }).sort((a,b) => b.total - a.total);

            llistaOrdenada.forEach((colla, index) => {
                html += `
                <div class="ranking-row">
                    <div>
                        <span style="color:#999; margin-right:10px;">#${index+1}</span>
                        <span class="colla-name">${colla.nom}</span>
                    </div>
                    <div class="colla-score">${colla.total} pts</div>
                </div>`;
            });
            document.getElementById("ranking-list").innerHTML = html || "No hi ha dades encara.";
        }

        function renderHistoric(rows) {
            let html = "<table><tr><th>Data</th><th>Colla</th><th>Castells</th><th>Total</th></tr>";
            rows.slice(1).reverse().forEach(r => {
                html += `<tr>
                    <td>${r[2]}</td>
                    <td><b>${r[0]}</b></td>
                    <td style="font-size:11px">${r[3]}, ${r[5]}, ${r[7]}</td>
                    <td>${r[11]}</td>
                </tr>`;
            });
            document.getElementById("historic-list").innerHTML = html + "</table>";
        }

        document.getElementById("castellsForm").onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Enviant...";
            btn.disabled = true;

            const d = {
                colla: document.getElementById("colla").value,
                diada: document.getElementById("diada").value,
                data: document.getElementById("data").value,
                r1: document.getElementById("r1").value,
                p1: punts[document.getElementById("r1").value] ? punts[document.getElementById("r1").value][document.getElementById("e1").value] : 0,
                r2: document.getElementById("r2").value,
                p2: punts[document.getElementById("r2").value] ? punts[document.getElementById("r2").value][document.getElementById("e2").value] : 0,
                r3: document.getElementById("r3").value,
                p3: punts[document.getElementById("r3").value] ? punts[document.getElementById("r3").value][document.getElementById("e3").value] : 0,
                pilar: document.getElementById("pilar").value,
                extra: document.getElementById("extra").value,
                total: calcTotal(),
                comentaris: document.getElementById("comentaris").value
            };

            try {
                await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(d) });
                alert("Diada publicada correctament al Google Sheets!");
                location.reload();
            } catch (err) {
                alert("Error en l'enviament");
                btn.innerText = "Publicar Diada";
                btn.disabled = false;
            }
        };

        loadData();
    </script>
</body>
</html>
